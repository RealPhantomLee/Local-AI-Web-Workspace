services:
  code-server:
    image: codercom/code-server:latest
    container_name: code-server
    restart: unless-stopped
    ports:
      - "${CODE_SERVER_PORT:-8443}:8080"
    environment:
      PASSWORD: "${CODE_SERVER_PASSWORD:-CHANGE_ME}"
    volumes:
      - ../../docker-data/code-server/config:/home/coder/.config
      - ../../workspace:/home/coder/project
    networks:
      - local_ai_workspace

networks:
  local_ai_workspace:
    external: true
